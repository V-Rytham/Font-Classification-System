<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Font Classifier</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Font Classifier</h1>
        <p class="subtitle">Upload an image containing text to predict its font.</p>

        <form id="upload-form">
          <label class="upload-box" for="file-input">
            <input id="file-input" name="file" type="file" accept="image/*" required />
            <span id="file-name">Choose an image</span>
          </label>
          <button id="predict-btn" type="submit">Predict Font</button>
        </form>

        <div id="status" class="status"></div>

        <div id="results" class="results hidden">
          <h2>Predictions</h2>
          <ul id="prediction-list"></ul>
        </div>
      </section>
    </main>

    <script src="/frontend/script.js"></script>
  </body>
</html>
